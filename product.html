<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар — TechStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-wrapper">
                <div class="logo">
                    <a href="index.html"><h1>Tech<span>Store</span></h1></a>
                </div>
                <nav class="nav">
                    <ul class="nav-menu">
                        <li><a href="index.html">Головна</a></li>
                        <li><a href="catalog.html">Каталог</a></li>
                        <li><a href="cart.html">Кошик</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <!-- П.5 — Іконка кошика з бейджем -->
                    <div class="cart-icon">
                        <a href="cart.html" aria-label="Перейти до кошика">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span id="cart-count" class="cart-count">0</span>
                        </a>
                    </div>
                    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Меню">☰</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- П.2 — Деталі товару (велике фото, опис, ціна, кнопка "В кошик")
                 рендеряться у JS на основі ?id=... з URL -->
            <div id="product-details"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>TechStore</h3>
                    <p>Ваш надійний партнер у світі комп'ютерних комплектуючих</p>
                </div>
                <div class="footer-section">
                    <h4>Навігація</h4>
                    <ul>
                        <li><a href="index.html">Головна</a></li>
                        <li><a href="catalog.html">Каталог</a></li>
                        <li><a href="cart.html">Кошик</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Контакти</h4>
                    <p>📞 +380 (44) 123-45-67</p>
                    <p>✉ info@techstore.ua</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 TechStore. Всі права захищені.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
